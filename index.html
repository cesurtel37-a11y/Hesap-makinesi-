<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miran'ın Hesap Makinesi</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #1a1a1a; font-family: sans-serif; }
        .calculator { background-color: #333; padding: 20px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 300px; }
        #display { width: 100%; height: 60px; font-size: 30px; text-align: right; margin-bottom: 20px; padding: 10px; box-sizing: border-box; border: none; border-radius: 10px; background: #222; color: #00ff00; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 20px; border: none; border-radius: 10px; cursor: pointer; background: #444; color: white; }
        .operator { background: #f39c12; }
        .equal { background: #27ae60; }
        .clear { background: #c0392b; }
        .col-span-2 { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" disabled placeholder="0">
        <div class="buttons">
            <button onclick="clearDisplay()" class="col-span-2 clear">C</button>
            <button onclick="deleteLast()">DEL</button>
            <button onclick="appendToDisplay('/')" class="operator">/</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('*')" class="operator">x</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('-')" class="operator">-</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('+')" class="operator">+</button>
            <button onclick="appendToDisplay('0')" class="col-span-2">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        function appendToDisplay(input) { display.value += input; }
        function clearDisplay() { display.value = ""; }
        function deleteLast() { display.value = display.value.slice(0, -1); }
        function calculate() { try { display.value = eval(display.value); } catch (e) { display.value = "Hata!"; } }
    </script>
</body>
</html>

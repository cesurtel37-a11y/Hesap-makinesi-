<div id="analysisPage" class="page">
    <div class="card" style="border-left: 5px solid #fedd00;">
        <h3>💰 Kişisel Bütçe Yönetimi</h3>
        <p style="font-size: 12px; color: #aaa;">Rakamları istediğin gibi değiştirebilirsin.</p>
        
        <label>Mevcut Gelirin / Bütçen (₺):</label>
        <input type="number" id="income" placeholder="Örn: 20000">
        
        <label>Bu Ayki Giderlerin (₺):</label>
        <input type="number" id="expense" placeholder="Örn: 5000">
        
        <label>Hedeflediğin Ürün Fiyatı (₺):</label>
        <input type="number" id="targetPrice" placeholder="Örn: 10000 (Bilgisayar)">
        
        <button onclick="analyze()" style="width:100%; padding:12px; background:#002e5d; color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px;">Analizi Başlat 🚀</button>
    </div>

    <div id="resultBox" class="card" style="display:none; background: #222;">
        <h4>Miran'ın Finansal Raporu:</h4>
        <div id="analysisResult" style="line-height: 1.8;"></div>
    </div>
</div>

<script>
    // Analiz Fonksiyonunu Güncelledim
    function analyze() {
        let inc = parseFloat(document.getElementById('income').value) || 0;
        let exp = parseFloat(document.getElementById('expense').value) || 0;
        let target = parseFloat(document.getElementById('targetPrice').value) || 0;
        let remain = inc - exp;
        
        let resBox = document.getElementById('resultBox');
        let resText = document.getElementById('analysisResult');
        resBox.style.display = "block";

        let pcStatus = "";
        if(target > 0) {
            if(remain >= target) {
                pcStatus = "<br>✅ **Müjde!** Şu anki paran hedeflediğin ürünü almaya yetiyor!";
            } else {
                let eksik = target - remain;
                pcStatus = `<br>❌ Hedefine ulaşmak için <b>${eksik} ₺</b> daha biriktirmen gerekiyor.`;
            }
        }

        resText.innerHTML = `
            <b>Net Kalan:</b> ${remain} ₺ <br>
            <b>Harcama Oranı:</b> %${((exp/inc)*100).toFixed(1)} <br>
            ${pcStatus} <br><br>
            <i style="color: #fedd00;">Gemini Notu: Bilgisayarın gelmesine (5 Nisan) çok az kaldı, bütçeni korumaya devam et!</i>
        `;
    }
</script>
